<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Debug Mode Login</title>
  <style>
    body {
      font-family: "Consolas", "Courier New", monospace;
      background: #000;
      color: #00ff88;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 420px;
      background: #0a0a0a;
      border: 1px solid #00ff88;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 20px #00ff88;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 22px;
      letter-spacing: 1px;
      color: #00ff88;
    }

    .google-btn {
      width: 100%;
      padding: 12px;
      background: #003300;
      color: #00ff88;
      border: 1px solid #00ff88;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .google-btn:hover {
      background: #005500;
      box-shadow: 0 0 10px #00ff88;
    }

    .otp-area {
      margin-top: 25px;
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #000;
      border: 1px solid #00ff88;
      border-radius: 4px;
      color: #00ff88;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      box-shadow: 0 0 10px #00ff88;
    }

    .otp-btn {
      width: 100%;
      padding: 12px;
      background: #003300;
      color: #00ff88;
      border: 1px solid #00ff88;
      border-radius: 4px;
      margin-top: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .otp-btn:hover {
      background: #005500;
      box-shadow: 0 0 10px #00ff88;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>DEBUG MODE LOGIN</h2>

  <button class="google-btn">Google Login</button>

  <div class="otp-area" id="otpArea">
    <h3 style="color:#00ff88;">OTP Verification</h3>
    <input type="text" placeholder="Enter 6-digit code">
    <button class="otp-btn">Verify</button>
  </div>
</div>

<script>
  // UIデモ用：Googleログインボタンを押したらOTP欄を表示
  document.querySelector(".google-btn").onclick = () => {
    document.getElementById("otpArea").style.display = "block";
  };
</script>

</body>
</html>
