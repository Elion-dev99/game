<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Starlike Quest - テスト版</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1b2b4a, #050814);
      color: #fff;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      box-sizing: border-box;
    }
    header {
      text-align: center;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 22px;
      margin: 4px 0;
    }
    header p {
      font-size: 11px;
      color: #c5d0ff;
      margin: 0;
    }
    .scene {
      display: none;
      flex: 1;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
      flex-direction: column;
    }
    .scene.active {
      display: flex;
    }
    .center {
      text-align: center;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(0,0,0,0.4);
      transition: transform 0.05s ease-out, box-shadow 0.05s ease-out, opacity 0.2s;
    }
    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.6);
    }
    .btn-primary {
      background: linear-gradient(135deg, #ffd86b, #ffb36b);
      color: #0b0f1c;
    }
    .btn-secondary {
      background: linear-gradient(135deg, #9fd3ff, #7be0ff);
      color: #0b0f1c;
    }
    .btn-ghost {
      background: rgba(0,0,0,0.55);
      color: #e5ecff;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }
    .btn.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .title-logo {
      font-size: 26px;
      margin-top: 40px;
      margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(255,216,107,0.8);
    }
    .subtitle {
      font-size: 12px;
      color: #c5d0ff;
      margin-bottom: 24px;
    }
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .status-box {
      flex: 1;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 6px 8px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
    }
    .status-box h2 {
      font-size: 12px;
      margin: 0 0 4px;
      color: #ffd86b;
    }
    .hp-bar, .mp-bar {
      position: relative;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin-bottom: 2px;
    }
    .hp-fill, .mp-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 100%;
      transition: width 0.2s ease-out;
    }
    .hp-fill {
      background: linear-gradient(90deg, #ff4b4b, #ffb36b);
    }
    .mp-fill {
      background: linear-gradient(90deg, #4b7bff, #7be0ff);
    }
    .hp-text, .mp-text {
      font-size: 10px;
      text-align: right;
      color: #e5ecff;
    }
    .enemy-box {
      text-align: center;
      padding: 8px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(0,0,0,0.4));
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
      margin-bottom: 8px;
    }
    .enemy-name {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .enemy-hp-bar {
      margin: 0 auto;
      width: 80%;
    }
    .log {
      flex: 1;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      padding: 6px;
      font-size: 11px;
      overflow-y: auto;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .log-line {
      margin-bottom: 2px;
    }
    .log-line.system { color: #9fd3ff; }
    .log-line.player { color: #ffe6a3; }
    .log-line.enemy  { color: #ffb3b3; }
    .commands {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-top: 4px;
    }
    .quest-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .quest-card {
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }
    .quest-info-title {
      font-size: 13px;
      margin-bottom: 2px;
      color: #ffd86b;
    }
    .quest-info-sub {
      font-size: 11px;
      color: #c5d0ff;
    }
    .result-box {
      text-align: center;
      margin-top: 20px;
    }
    .result-title {
      font-size: 18px;
      margin-bottom: 8px;
      color: #ffd86b;
    }
    .result-detail {
      font-size: 13px;
      margin-bottom: 4px;
    }
    .gacha-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .gacha-box {
      width: 90%;
      max-width: 360px;
      background: radial-gradient(circle at top, #2b234a, #050814);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 0 24px rgba(0,0,0,0.8);
      text-align: center;
    }
    .gacha-title {
      font-size: 16px;
      margin-bottom: 8px;
      color: #ffd86b;
    }
    .gacha-result {
      margin: 12px 0;
      font-size: 14px;
    }
    .gacha-rarity {
      font-weight: 700;
    }
    .rarity-3 { color: #9fd3ff; }
    .rarity-4 { color: #b0ffb3; }
    .rarity-5 {
      color: #ffd86b;
      text-shadow: 0 0 8px rgba(255,216,107,0.8);
    }
    .bottom-bar {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #c5d0ff;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Starlike Quest</h1>
    <p>星のドラゴンクエストをオマージュしたテスト用Webデモ（非公式）</p>
  </header>

  <!-- タイトルシーン -->
  <div class="scene active" id="scene-title">
    <div class="center" style="margin:auto 0;">
      <div class="title-logo">Starlike Quest</div>
      <div class="subtitle">星風の記憶 - テストビルド</div>
      <div class="menu-list">
        <button class="btn btn-primary" id="btnStart">はじめる</button>
        <button class="btn btn-ghost" id="btnContinue">つづきから</button>
        <button class="btn btn-ghost" id="btnClearSave">セーブデータ削除</button>
      </div>
    </div>
  </div>

  <!-- クエスト選択シーン -->
  <div class="scene" id="scene-quest">
    <div class="status-bar">
      <div class="status-box">
        <h2>勇者</h2>
        <div style="font-size:11px;" id="statusName">Lv1 星風の勇者</div>
        <div style="font-size:11px;" id="statusAtkDef"></div>
        <div style="font-size:10px;color:#c5d0ff;" id="statusExp"></div>
      </div>
      <div class="status-box">
        <h2>そうび</h2>
        <div style="font-size:11px;" id="equipMain">木のつるぎ</div>
        <div style="font-size:10px;color:#c5d0ff;" id="equipSub">星風シリーズ：未入手</div>
      </div>
    </div>
    <div style="font-size:13px;margin-bottom:4px;">クエストをえらんでください。</div>
    <div class="quest-list" id="questList"></div>
    <div style="margin-top:12px;">
      <button class="btn btn-ghost" id="btnBackTitle">タイトルにもどる</button>
      <button class="btn btn-secondary" id="btnOpenGachaFromQuest" style="float:right;">宝箱（ガチャ）</button>
    </div>
  </div>

  <!-- バトルシーン -->
  <div class="scene" id="scene-battle">
    <div class="status-bar">
      <div class="status-box">
        <h2>勇者</h2>
        <div class="hp-bar">
          <div class="hp-fill" id="playerHpFill"></div>
        </div>
        <div class="hp-text" id="playerHpText"></div>
        <div class="mp-bar">
          <div class="mp-fill" id="playerMpFill"></div>
        </div>
        <div class="mp-text" id="playerMpText"></div>
      </div>
      <div class="status-box">
        <h2>そうび</h2>
        <div style="font-size:11px;" id="battleEquipMain">木のつるぎ</div>
        <div style="font-size:10px;color:#c5d0ff;" id="battleEquipSub">星風シリーズ：未入手</div>
      </div>
    </div>

    <div class="enemy-box">
      <div class="enemy-name" id="enemyName">星影スライム</div>
      <div class="hp-bar enemy-hp-bar">
        <div class="hp-fill" id="enemyHpFill"></div>
      </div>
      <div class="hp-text" id="enemyHpText"></div>
    </div>

    <div class="log" id="log"></div>

    <div class="commands">
      <button class="btn btn-primary" id="btnAttack">こうげき</button>
      <button class="btn btn-secondary" id="btnSkill">スキル</button>
      <button class="btn btn-secondary" id="btnGuard">ぼうぎょ</button>
      <button class="btn btn-secondary" id="btnHeal">やくそう</button>
    </div>

    <div class="bottom-bar">
      <div id="battleQuestName">クエスト名</div>
      <div>テストビルド / オフライン</div>
    </div>
  </div>

  <!-- リザルトシーン -->
  <div class="scene" id="scene-result">
    <div class="result-box">
      <div class="result-title" id="resultTitle">クエストクリア！</div>
      <div class="result-detail" id="resultExp">EXP +0</div>
      <div class="result-detail" id="resultGold">ゴールド +0</div>
      <div class="result-detail" id="resultDrop">ドロップ：なし</div>
      <div class="result-detail" id="resultLevelUp" style="color:#ffd86b;"></div>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="btnResultToQuest">クエストにもどる</button>
        <button class="btn btn-secondary" id="btnResultGacha">宝箱をあける</button>
      </div>
    </div>
  </div>
</div>

<!-- ガチャオーバーレイ -->
<div class="gacha-overlay" id="gachaOverlay">
  <div class="gacha-box">
    <div class="gacha-title">星風装備ガチャ（1連）</div>
    <div class="gacha-result" id="gachaResultText">...</div>
    <button class="btn btn-primary" id="gachaCloseBtn">とじる</button>
  </div>
</div>

<script>
  // =========================
  // データ定義
  // =========================
  const SAVE_KEY = "starlike_save_v1";

  const basePlayer = {
    name: "星風の勇者",
    level: 1,
    exp: 0,
    nextExp: 20,
    maxHp: 100,
    maxMp: 30,
    atk: 18,
    def: 8,
    herb: 3,
    mainWeapon: "木のつるぎ",
    starSetOwned: false
  };

  const quests = [
    {
      id: "q1",
      name: "星影の草原",
      desc: "はじまりの草原。星影スライムが あらわれる。",
      recommended: "推奨Lv1",
      enemy: {
        name: "星影スライム",
        maxHp: 80,
        atk: 12,
        exp: 15,
        gold: 10
      }
    },
    {
      id: "q2",
      name: "月光の洞くつ",
      desc: "少しきびしい戦い。月光ゴーストが でてくる。",
      recommended: "推奨Lv3",
      enemy: {
        name: "月光ゴースト",
        maxHp: 120,
        atk: 18,
        exp: 30,
        gold: 25
      }
    },
    {
      id: "q3",
      name: "星風の塔・入口",
      desc: "テスト用ボス戦。星風ナイトが たちはだかる。",
      recommended: "推奨Lv5",
      enemy: {
        name: "星風ナイト",
        maxHp: 180,
        atk: 24,
        exp: 60,
        gold: 50
      }
    }
  ];

  const gachaTable = [
    { name: "星風のつるぎ", rarity: 5, type: "main", atkBonus: 18 },
    { name: "星風のよろい上", rarity: 4, type: "armor", defBonus: 6 },
    { name: "星風のよろい下", rarity: 4, type: "armor", defBonus: 4 },
    { name: "星風のぼうし", rarity: 3, type: "armor", defBonus: 2 },
    { name: "星風のたて", rarity: 3, type: "shield", defBonus: 3 },
    { name: "旅立ちのつるぎ", rarity: 3, type: "main", atkBonus: 8 },
    { name: "旅立ちの服", rarity: 3, type: "armor", defBonus: 2 }
  ];

  // =========================
  // 状態
  // =========================
  let player = JSON.parse(JSON.stringify(basePlayer));
  let currentQuest = null;
  let battleState = null; // {playerHp, playerMp, enemyHp, guard}
  let turnLock = false;

  // =========================
  // DOM
  // =========================
  const sceneTitle  = document.getElementById("scene-title");
  const sceneQuest  = document.getElementById("scene-quest");
  const sceneBattle = document.getElementById("scene-battle");
  const sceneResult = document.getElementById("scene-result");

  const btnStart      = document.getElementById("btnStart");
  const btnContinue   = document.getElementById("btnContinue");
  const btnClearSave  = document.getElementById("btnClearSave");
  const btnBackTitle  = document.getElementById("btnBackTitle");
  const btnOpenGachaFromQuest = document.getElementById("btnOpenGachaFromQuest");

  const questListEl   = document.getElementById("questList");

  const statusName    = document.getElementById("statusName");
  const statusAtkDef  = document.getElementById("statusAtkDef");
  const statusExp     = document.getElementById("statusExp");
  const equipMainEl   = document.getElementById("equipMain");
  const equipSubEl    = document.getElementById("equipSub");

  const playerHpFill  = document.getElementById("playerHpFill");
  const playerHpText  = document.getElementById("playerHpText");
  const playerMpFill  = document.getElementById("playerMpFill");
  const playerMpText  = document.getElementById("playerMpText");
  const enemyHpFill   = document.getElementById("enemyHpFill");
  const enemyHpText   = document.getElementById("enemyHpText");
  const enemyNameEl   = document.getElementById("enemyName");
  const logEl         = document.getElementById("log");
  const battleEquipMain = document.getElementById("battleEquipMain");
  const battleEquipSub  = document.getElementById("battleEquipSub");
  const battleQuestName = document.getElementById("battleQuestName");

  const btnAttack = document.getElementById("btnAttack");
  const btnSkill  = document.getElementById("btnSkill");
  const btnGuard  = document.getElementById("btnGuard");
  const btnHeal   = document.getElementById("btnHeal");

  const resultTitle   = document.getElementById("resultTitle");
  const resultExp     = document.getElementById("resultExp");
  const resultGold    = document.getElementById("resultGold");
  const resultDrop    = document.getElementById("resultDrop");
  const resultLevelUp = document.getElementById("resultLevelUp");
  const btnResultToQuest = document.getElementById("btnResultToQuest");
  const btnResultGacha   = document.getElementById("btnResultGacha");

  const gachaOverlay   = document.getElementById("gachaOverlay");
  const gachaResultText= document.getElementById("gachaResultText");
  const gachaCloseBtn  = document.getElementById("gachaCloseBtn");

  // =========================
  // 共通ユーティリティ
  // =========================
  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }
  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }
  function showScene(scene) {
    [sceneTitle, sceneQuest, sceneBattle, sceneResult].forEach(s => s.classList.remove("active"));
    scene.classList.add("active");
  }
  function addLog(text, type = "system") {
    const line = document.createElement("div");
    line.className = `log-line ${type}`;
    line.textContent = text;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function setCommandsEnabled(enabled) {
    [btnAttack, btnSkill, btnGuard, btnHeal].forEach(b => {
      if (enabled) b.classList.remove("disabled");
      else b.classList.add("disabled");
    });
  }

  // =========================
  // セーブ / ロード
  // =========================
  function saveGame() {
    const data = { player };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }
  function loadGame() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    try {
      const data = JSON.parse(raw);
      if (data && data.player) {
        player = data.player;
        return true;
      }
    } catch(e) {}
    return false;
  }
  function clearSave() {
    localStorage.removeItem(SAVE_KEY);
  }

  // =========================
  // ステータス更新
  // =========================
  function updateQuestStatusView() {
    statusName.textContent = `Lv${player.level} ${player.name}`;
    statusAtkDef.textContent = `こうげき ${player.atk} / ぼうぎょ ${player.def}`;
    statusExp.textContent = `EXP ${player.exp} / 次のLvまで ${player.nextExp - player.exp}`;
    equipMainEl.textContent = player.mainWeapon;
    equipSubEl.textContent = player.starSetOwned ? "星風シリーズ：1部位以上" : "星風シリーズ：未入手";
  }
  function updateBattleStatusView() {
    const p = battleState;
    const e = battleState.enemy;

    const hpRate = (p.hp / p.maxHp) * 100;
    const mpRate = (p.mp / p.maxMp) * 100;
    const ehpRate = (e.hp / e.maxHp) * 100;

    playerHpFill.style.width = hpRate + "%";
    playerHpText.textContent = `HP ${p.hp} / ${p.maxHp}`;
    playerMpFill.style.width = mpRate + "%";
    playerMpText.textContent = `MP ${p.mp} / ${p.maxMp}`;

    enemyHpFill.style.width = ehpRate + "%";
    enemyHpText.textContent = `HP ${e.hp} / ${e.maxHp}`;

    battleEquipMain.textContent = player.mainWeapon;
    battleEquipSub.textContent = player.starSetOwned ? "星風シリーズ：1部位以上" : "星風シリーズ：未入手";
  }

  // =========================
  // クエスト選択
  // =========================
  function renderQuestList() {
    questListEl.innerHTML = "";
    quests.forEach(q => {
      const card = document.createElement("div");
      card.className = "quest-card";

      const left = document.createElement("div");
      const title = document.createElement("div");
      title.className = "quest-info-title";
      title.textContent = q.name;
      const sub = document.createElement("div");
      sub.className = "quest-info-sub";
      sub.textContent = `${q.desc} / ${q.recommended}`;
      left.appendChild(title);
      left.appendChild(sub);

      const right = document.createElement("div");
      const btn = document.createElement("button");
      btn.className = "btn btn-secondary";
      btn.textContent = "出発";
      btn.addEventListener("click", () => startQuest(q));
      right.appendChild(btn);

      card.appendChild(left);
      card.appendChild(right);
      questListEl.appendChild(card);
    });
  }

  function startQuest(q) {
    currentQuest = q;
    // バトル状態初期化
    battleState = {
      maxHp: player.maxHp,
      hp: player.maxHp,
      maxMp: player.maxMp,
      mp: player.maxMp,
      guard: false,
      enemy: {
        name: q.enemy.name,
        maxHp: q.enemy.maxHp,
        hp: q.enemy.maxHp,
        atk: q.enemy.atk,
        exp: q.enemy.exp,
        gold: q.enemy.gold
      }
    };
    enemyNameEl.textContent = battleState.enemy.name;
    logEl.innerHTML = "";
    addLog(`${q.name} に やってきた。`, "system");
    addLog(`${battleState.enemy.name} が あらわれた！`, "system");
    battleQuestName.textContent = q.name;
    turnLock = false;
    setCommandsEnabled(true);
    updateBattleStatusView();
    showScene(sceneBattle);
  }

  // =========================
  // バトル処理
  // =========================
  function playerAttack() {
    if (turnLock) return;
    turnLock = true;
    setCommandsEnabled(false);

    const base = player.atk;
    const dmg = randomInt(base - 4, base + 4);
    const finalDmg = clamp(dmg, 1, 999);

    battleState.enemy.hp = clamp(battleState.enemy.hp - finalDmg, 0, battleState.enemy.maxHp);
    addLog(`勇者のこうげき！ ${battleState.enemy.name}に ${finalDmg} のダメージ！`, "player");
    updateBattleStatusView();

    if (battleState.enemy.hp <= 0) {
      endBattle(true);
      return;
    }
    setTimeout(enemyTurn, 500);
  }

  function playerSkill() {
    if (turnLock) return;
    if (battleState.mp < 8) {
      addLog("MPがたりない！", "system");
      return;
    }
    turnLock = true;
    setCommandsEnabled(false);

    battleState.mp = clamp(battleState.mp - 8, 0, battleState.maxMp);
    const base = player.atk * 1.6;
    const dmg = randomInt(base - 6, base + 6);
    const finalDmg = clamp(Math.floor(dmg), 1, 999);

    addLog("勇者は『星風れんげき』をはなった！", "player");
    battleState.enemy.hp = clamp(battleState.enemy.hp - finalDmg, 0, battleState.enemy.maxHp);
    addLog(`${battleState.enemy.name}に ${finalDmg} のダメージ！`, "player");
    updateBattleStatusView();

    if (battleState.enemy.hp <= 0) {
      endBattle(true);
      return;
    }
    setTimeout(enemyTurn, 500);
  }

  function playerGuard() {
    if (turnLock) return;
    turnLock = true;
    setCommandsEnabled(false);

    battleState.guard = true;
    addLog("勇者は みをまもっている…", "player");
    setTimeout(enemyTurn, 400);
  }

  function playerHeal() {
    if (turnLock) return;
    if (player.herb <= 0) {
      addLog("やくそうを もっていない。", "system");
      return;
    }
    turnLock = true;
    setCommandsEnabled(false);

    player.herb -= 1;
    const heal = randomInt(25, 35);
    battleState.hp = clamp(battleState.hp + heal, 0, battleState.maxHp);
    addLog(`勇者は やくそうをつかった！ HPが ${heal} かいふく！`, "player");
    updateBattleStatusView();

    setTimeout(enemyTurn, 400);
  }

  function enemyTurn() {
    const e = battleState.enemy;
    if (battleState.hp <= 0 || e.hp <= 0) {
      turnLock = false;
      setCommandsEnabled(false);
      return;
    }

    const base = e.atk;
    let dmg = randomInt(base - 3, base + 3);
    if (battleState.guard) {
      dmg = Math.floor(dmg * 0.4);
    }
    const finalDmg = clamp(dmg, 1, 999);

    addLog(`${e.name}のこうげき！ 勇者に ${finalDmg} のダメージ！`, "enemy");
    battleState.hp = clamp(battleState.hp - finalDmg, 0, battleState.maxHp);
    updateBattleStatusView();

    if (battleState.hp <= 0) {
      endBattle(false);
    } else {
      battleState.guard = false;
      turnLock = false;
      setCommandsEnabled(true);
    }
  }

  function endBattle(playerWin) {
    turnLock = false;
    setCommandsEnabled(false);

    if (playerWin) {
      addLog(`${battleState.enemy.name}を たおした！`, "system");
      showResult(true, battleState.enemy.exp, battleState.enemy.gold);
    } else {
      addLog("勇者は ちからつきた…", "system");
      showResult(false, Math.floor(battleState.enemy.exp / 4), 0);
    }
  }

  // =========================
  // リザルト処理
  // =========================
  function showResult(win, expGain, goldGain) {
    showScene(sceneResult);
    resultTitle.textContent = win ? "クエストクリア！" : "たおされてしまった…";
    resultExp.textContent   = `EXP +${expGain}`;
    resultGold.textContent  = `ゴールド +${goldGain}`;
    resultDrop.textContent  = win ? "ドロップ：テスト用アイテム（演出のみ）" : "ドロップ：なし";

    let levelUpText = "";
    const beforeLevel = player.level;
    player.exp += expGain;

    while (player.exp >= player.nextExp) {
      player.exp -= player.nextExp;
      player.level += 1;
      player.nextExp = Math.floor(player.nextExp * 1.4);
      player.maxHp += 12;
      player.maxMp += 4;
      player.atk   += 3;
      player.def   += 2;
      levelUpText += `Lv${player.level} に レベルアップ！ `;
    }
    resultLevelUp.textContent = levelUpText;

    saveGame();
  }

  // =========================
  // ガチャ処理
  // =========================
  function rollGachaOnce() {
    const r = Math.random();
    let targetRarity;
    if (r < 0.05) targetRarity = 5;
    else if (r < 0.25) targetRarity = 4;
    else targetRarity = 3;

    const candidates = gachaTable.filter(i => i.rarity === targetRarity);
    const item = candidates[randomInt(0, candidates.length - 1)];

    if (item.type === "main") {
      player.mainWeapon = item.name;
      player.atk += item.atkBonus || 0;
      if (item.rarity >= 4) player.starSetOwned = true;
    } else {
      player.def += item.defBonus || 0;
      if (item.rarity >= 4) player.starSetOwned = true;
    }

    saveGame();
    return item;
  }

  function openGacha() {
    const item = rollGachaOnce();
    const rarityStars = "★".repeat(item.rarity);
    const rarityClass = `rarity-${item.rarity}`;
    gachaResultText.innerHTML =
      `<div>宝箱を あけた！</div>` +
      `<div style="margin-top:6px;">` +
      `<span class="gacha-rarity ${rarityClass}">${rarityStars}</span> ` +
      `<span>${item.name}</span>` +
      `</div>`;
    gachaOverlay.style.display = "flex";
  }

  // =========================
  // イベント
  // =========================
  btnStart.addEventListener("click", () => {
    player = JSON.parse(JSON.stringify(basePlayer));
    saveGame();
    updateQuestStatusView();
    renderQuestList();
    showScene(sceneQuest);
  });

  btnContinue.addEventListener("click", () => {
    const ok = loadGame();
    if (!ok) {
      alert("セーブデータがありません。");
      return;
    }
    updateQuestStatusView();
    renderQuestList();
    showScene(sceneQuest);
  });

  btnClearSave.addEventListener("click", () => {
    if (confirm("セーブデータを削除しますか？")) {
      clearSave();
      alert("削除しました。");
    }
  });

  btnBackTitle.addEventListener("click", () => {
    showScene(sceneTitle);
  });

  btnOpenGachaFromQuest.addEventListener("click", () => {
    openGacha();
  });

  btnAttack.addEventListener("click", playerAttack);
  btnSkill.addEventListener("click", playerSkill);
  btnGuard.addEventListener("click", playerGuard);
  btnHeal.addEventListener("click", playerHeal);

  btnResultToQuest.addEventListener("click", () => {
    updateQuestStatusView();
    renderQuestList();
    showScene(sceneQuest);
  });

  btnResultGacha.addEventListener("click", () => {
    openGacha();
  });

  gachaCloseBtn.addEventListener("click", () => {
    gachaOverlay.style.display = "none";
    updateQuestStatusView();
  });

  // =========================
  // 初期化
  // =========================
  (function init() {
    // タイトルの「つづきから」活性/非活性
    if (!localStorage.getItem(SAVE_KEY)) {
      btnContinue.classList.add("disabled");
    }
  })();
</script>
</body>
</html>
